{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-lg border-0 auth-card">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="fa fa-shield-halved fa-2x text-success mb-2"></i>
          <h4 class="fw-bold">SecureLogin</h4>
          <p class="text-muted small">Sign in to your account</p>
        </div>
        <form method="POST" novalidate>
          <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fa fa-user"></i></span>
              <input type="text" name="username" class="form-control" placeholder="Your username" required/>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fa fa-lock"></i></span>
              <input type="password" name="password" id="password" class="form-control" placeholder="Your password" required/>
              <button class="btn btn-outline-secondary" type="button" onclick="togglePwd('password','eyeLog')">
                <i class="fa fa-eye" id="eyeLog"></i>
              </button>
            </div>
          </div>
          <button type="submit" class="btn btn-success w-100 fw-bold py-2">
            <i class="fa fa-right-to-bracket me-1"></i> Login
          </button>
        </form>
        <hr/>
        <p class="text-center mb-0 text-muted small">
          No account? <a href="{{ url_for('register') }}">Register here</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
