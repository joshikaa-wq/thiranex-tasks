{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-lg border-0 auth-card">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="fa fa-user-plus fa-2x text-success mb-2"></i>
          <h4 class="fw-bold">Create Account</h4>
          <p class="text-muted small">Join SecureLogin today</p>
        </div>
        <form method="POST" novalidate>
          <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fa fa-user"></i></span>
              <input type="text" name="username" class="form-control" placeholder="john_doe" required/>
            </div>
            <div class="form-text">3-20 chars, letters/numbers/underscore</div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fa fa-envelope"></i></span>
              <input type="email" name="email" class="form-control" placeholder="you@example.com" required/>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fa fa-lock"></i></span>
              <input type="password" name="password" id="password" class="form-control" placeholder="Min 8 chars" required/>
              <button class="btn btn-outline-secondary" type="button" onclick="togglePwd('password','eyeReg')">
                <i class="fa fa-eye" id="eyeReg"></i>
              </button>
            </div>
          </div>
          <div class="mb-3" id="strengthBar">
            <div class="progress" style="height:6px">
              <div id="strengthFill" class="progress-bar" style="width:0%"></div>
            </div>
            <small id="strengthText" class="text-muted"></small>
          </div>
          <button type="submit" class="btn btn-success w-100 fw-bold py-2">
            <i class="fa fa-user-check me-1"></i> Register
          </button>
        </form>
        <hr/>
        <p class="text-center mb-0 text-muted small">
          Already have an account? <a href="{{ url_for('login') }}">Login here</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
