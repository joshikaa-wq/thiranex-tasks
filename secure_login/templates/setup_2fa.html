{% extends "base.html" %}
{% block title %}Setup 2FA{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-lg border-0 auth-card">
      <div class="card-body p-4">
        <div class="text-center mb-3">
          <i class="fa fa-qrcode fa-2x text-success mb-2"></i>
          <h5 class="fw-bold">Setup Two-Factor Auth</h5>
          <p class="text-muted small">Scan this QR with Google Authenticator or Authy</p>
        </div>
        <div class="text-center mb-3">
          <img src="data:image/png;base64,{{ qr }}" class="img-fluid rounded border" style="max-width:200px"/>
        </div>
        <div class="alert alert-info py-2 small text-center">
          <b>Manual key:</b> <code>{{ secret }}</code>
        </div>
        <form method="POST">
          <input type="hidden" name="secret" value="{{ secret }}"/>
          <div class="mb-3">
            <label class="form-label fw-semibold">Enter OTP to verify</label>
            <input type="text" name="otp" class="form-control text-center fs-4 letter-spacing"
                   maxlength="6" placeholder="000000" autocomplete="off" required/>
          </div>
          <button type="submit" class="btn btn-success w-100 fw-bold">
            <i class="fa fa-check me-1"></i> Verify & Enable 2FA
          </button>
        </form>
        <hr/>
        <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary w-100">
          Cancel
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
