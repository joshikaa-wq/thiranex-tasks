{% extends "base.html" %}
{% block title %}Verify OTP{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-lg border-0 auth-card">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="fa fa-mobile-screen fa-2x text-success mb-2"></i>
          <h5 class="fw-bold">Two-Factor Authentication</h5>
          <p class="text-muted small">Enter the 6-digit OTP from your authenticator app</p>
        </div>
        <form method="POST">
          <div class="mb-4">
            <input type="text" name="otp" class="form-control text-center fs-3 letter-spacing"
                   maxlength="6" placeholder="000000" autocomplete="off" required autofocus/>
          </div>
          <button type="submit" class="btn btn-success w-100 fw-bold py-2">
            <i class="fa fa-unlock me-1"></i> Verify OTP
          </button>
        </form>
        <hr/>
        <a href="{{ url_for('login') }}" class="btn btn-outline-secondary w-100 btn-sm">
          <i class="fa fa-arrow-left me-1"></i> Back to Login
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
